<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medical Certificate Generator Pro <V0 class="1"></V0></title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">
            <i class="fa-solid fa-file-waveform"></i>
            <h2>Medical Certificate Generator</h2>
        </div>

        <div class="doctor">
            <h3>Doctor Prescription System</h3>
            <p>Version 1.0</p>
        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- ================= LEFT PANEL ================= -->

        <section class="sidebar">

            <!-- Patient Information -->

            <div class="card">

                <h3>Patient Information</h3>

                <div class="form-group">
                    <label>Patient Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Enter patient name">
                </div>

                <div class="form-group">
                    <label>Age</label>

                    <div class="input-with-unit">
                        <input
                            type="number"
                            id="age"
                            placeholder="Age">
                        <span>Yrs</span>
                    </div>

                </div>

                <div class="form-group">

                    <label>Gender</label>

                    <select id="gender">
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>

                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>

            </div>

            <!-- Vital Signs -->

            <div class="card">

                <h3>Vital Signs</h3>

                <div class="form-group">

                    <label>Blood Pressure</label>

                    <div class="input-with-unit">
                        <input
                            type="text"
                            id="bp"
                            placeholder="120/80">
                        <span>mmHg</span>
                    </div>

                </div>

                <div class="form-group">

                    <label>Pulse</label>

                    <div class="input-with-unit">
                        <input
                            type="number"
                            id="pulse"
                            placeholder="72">
                        <span>bpm</span>
                    </div>

                </div>

                <div class="form-group">

                    <label>Height</label>

                    <div class="input-with-unit">
                        <input
                            type="text"
                            id="height"
                            placeholder="170">
                        <span>cm</span>
                    </div>

                </div>

                <div class="form-group">

                    <label>Weight</label>

                    <div class="input-with-unit">
                        <input
                            type="text"
                            id="weight"
                            placeholder="65">
                        <span>kg</span>
                    </div>

                </div>

            </div>

            <!-- Diagnosis -->

            <div class="card">

                <h3>Diagnosis / Remarks</h3>

                <textarea
                    id="remarks"
                    rows="8"
                    placeholder="Write diagnosis or remarks..."></textarea>

            </div>
            <!-- ================= PREVIEW PANEL ================= -->

        </section>

        <section class="preview-panel">

            <div class="certificate-wrapper">

                <div id="certificate">

                    <img
                        src="assets/template.jpg"
                        id="templateImage"
                        alt="Medical Certificate">

                    <!-- Preview Fields -->

                    <span id="previewName" class="field name"></span>

                    <span id="previewAge" class="field age"></span>

                    <span id="previewGender" class="field gender"></span>

                    <span id="previewDate" class="field date"></span>

                    <span id="previewBP" class="field bp"></span>

                    <span id="previewPulse" class="field pulse"></span>

                    <span id="previewHeight" class="field height"></span>

                    <span id="previewWeight" class="field weight"></span>

                    <div id="previewRemarks" class="field remarks"></div>

                </div>

            </div>

            <!-- Action Buttons -->

            <div class="buttons">

                <button
                    class="blue"
                    id="previewBtn">

                    <i class="fa-solid fa-eye"></i>
                    Preview

                </button>

                <button
                    class="green"
                    id="pdfBtn">

                    <i class="fa-solid fa-file-pdf"></i>
                    Download PDF

                </button>

                <button
                    class="orange"
                    id="printBtn">

                    <i class="fa-solid fa-print"></i>
                    Print

                </button>

                <button
                    class="red"
                    id="resetBtn">

                    <i class="fa-solid fa-rotate-left"></i>
                    Reset

                </button>

            </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <span id="statusText">
            Ready
        </span>

        <span>
            Medical Certificate Generator Pro <V0 class="1"></V0> <v1 class="0"></v1>
        </span>

    </footer>

    <!-- Toast -->

    <div id="toast" class="toast"></div>

    <!-- Libraries -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Main Script -->

    <script src="script.js"></script>

</body>

</html>
